<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vamos descobrir a soma!</title>
</head>
<body>
    <h1>Calcule a soma dos dois números</h1>
    <input type="number" id="num1" placeholder=" número 1" />
    <input type="number" id="num2" placeholder=" número 2" />
    <button id="calcular">Calcular Soma</button>

     <!-- Parágrafo para mostrar o resultado -->    
  <p id="resultado"></p>    

  <script>          
    const input1 = document.getElementById('num1');
    const input2 = document.getElementById('num2');
    const btnCalcular = document.getElementById('calcular');
    const resultado = document.getElementById('resultado');

    btnCalcular.addEventListener('click', () => {
      const n1 = Number(input1.value);
      const n2 = Number(input2.value);
      const soma = n1 + n2;

      // Mostrar no console
      console.log(`A soma de ${n1} e ${n2} é: ${soma}`);

      // Mostrar na página dentro do parágrafo
      resultado.textContent = `A soma de ${n1} e ${n2} é: ${soma}`;
    });
  </script>
      
</body>
</html>
