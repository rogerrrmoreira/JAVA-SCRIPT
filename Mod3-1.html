<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <title>Qual sera a soma 1 a 10?</title>
</head>
<body> 

    <button onclick="calcularSoma()">Calcular a soma de 1 a 10</button> 
    <p id="resultado"> </p>
    <script>
        // Calcula a soma dos numeros de 1 a 10 utilizando o metodo for
        function calcularSoma() {
            let soma = 0;
            for (let i = 1; i <= 10; i++) {
                soma += i; // Adiciona o valor de i à soma
            }
            alert(`A soma dos numeros de 1 a 10 é: ${soma}`);
            console.log(`A soma dos numeros de 1 a 10 é: ${soma}`);
        }
    </script>

    
</body>
</html>
