<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>É maior que 10?</title>
    
</head>
<body>
    <input type="number" id="numero" placeholder="Digite um número" />
    <button id="verificar">Verificar</button>
    <p id="mensagem"></p>

    <script>
        const inputNumero = document.getElementById('numero');
        const btnVerificar = document.getElementById('verificar');
        const mensagem = document.getElementById('mensagem');

        btnVerificar.addEventListener('click', () => {
            const numero = Number(inputNumero.value);

            if (numero > 10) {
                mensagem.textContent = "O número é maior que 10.";
                console.log("O número é maior que 10.");
            } else if (numero === 10) {
                mensagem.textContent = "O número é igual a 10.";
                console.log("O número é igual a 10.");
            } else {
                mensagem.textContent = "O número é menor que 10.";
                console.log("O número é menor que 10.");
            }
        });


    </script>
  </body>
</html>
