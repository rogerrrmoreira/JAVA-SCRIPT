<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <title>Multiplos de 3 Fizz e 5 Buzz!</title>
</head>
<body>
    <h2>Multiplos de 3 Fizz e 5 Buzz!</h2>
    <button onclick="mostrarMultiplos()">Mostrar multiplos</button>
    <p id="resultado"></p>

    <script>
        function mostrarMultiplos() { // Funcao para mostrar os multiplos
            let resultado = ""; // Variavel para armazenar o resultado
            for (let i = 1; i <= 100; i++) { // Loop para percorrer os multiplos
                if (i % 3 === 0 && i % 5 === 0) {
                    resultado += "FizzBuzz ";
                } else if (i % 3 === 0) {
                    resultado += "Fizz ";
                } else if (i % 5 === 0) {
                    resultado += "Buzz ";
                } else {
                    resultado += i + " ";
                }
            }
            document.getElementById("resultado").textContent = resultado;
            console.log(resultado);
        }
    </script>
</body>
</html>
