<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <title>Veja quais sao os numeros pares da sua lista!</title>
</head>
<body>  
    <h2>Veja quais sao os numeros pares da sua lista!</h2>
    <input type="number" id="num1" placeholder="Digite um numero">
    <input type="number" id="num2" placeholder="Digite um numero">
    <input type="number" id="num3" placeholder="Digite um numero">
    <input type="number" id="num4" placeholder="Digite um numero">
    <input type="number" id="num5" placeholder="Digite um numero">
    <button onclick="mostrarPares()">Verificar</button>

    <script>    
        function mostrarPares() {
            const num1 = Number(document.getElementById('num1').value);
            const num2 = Number(document.getElementById('num2').value);
            const num3 = Number(document.getElementById('num3').value);
            const num4 = Number(document.getElementById('num4').value);
            const num5 = Number(document.getElementById('num5').value);  
            const numeros = [num1, num2, num3, num4, num5];
            const pares = numeros.filter(num => num % 2 === 0);
            alert("Os números pares da lista são: " + pares);
            console.log("Os números pares da lista são: " + pares);
        }
    </script>
  
</body>
</html>
