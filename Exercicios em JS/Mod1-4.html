<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seu número é POSITIVO ou NEGATIVO?</title>
</head>
<body>
     <input type="number" id="numero" placeholder="Digite um número" />
    <button id="verificar">Verificar</button>
    <p id="mensagem"></p>

    <script>
        const inputNumero = document.getElementById('numero');
        const btnVerificar = document.getElementById('verificar');
        const mensagem = document.getElementById('mensagem');

        btnVerificar.addEventListener('click', () => {
            const numero = Number(inputNumero.value);

            if (numero > 0) {
                mensagem.textContent = "O número é POSITIVO.";
                console.log("O número é POSITIVO.");
            } else if (numero === 0) {
                mensagem.textContent = "O número é igual a 0.";
                console.log("O número é igual a 0.");   
            } else {
                mensagem.textContent = "O número é NEGATIVO.";
            }
        });
    </script>
</body>
</html>
