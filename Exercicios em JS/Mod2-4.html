<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <title>Vamos comparar as Strings!</title>
</head>
<body>
    <h1>Comparando Strings</h1>
    <input type="text" id="str1" placeholder="String 1" />
    <input type="text" id="str2" placeholder="String 2" />
    <button id="comparar">Comparar Strings</button>

     <!-- Parágrafo para mostrar o resultado -->    
  <p id="resultado"></p>    

  <script>          
    const input1 = document.getElementById('str1');
    const input2 = document.getElementById('str2');
    const btnComparar = document.getElementById('comparar');
    const resultado = document.getElementById('resultado');

    btnComparar.addEventListener('click', () => {
      const str1 = input1.value;
      const str2 = input2.value;

      if (str1 === str2) {
        resultado.textContent = 'As strings são iguais.';
        console.log('As strings são iguais.');
      } else {
        resultado.textContent = 'As strings são diferentes.';
        console.log('As strings são diferentes.');
      }
    });
  </script>
</body>
</html>
