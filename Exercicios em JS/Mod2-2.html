<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <title>Vamos calcular o resto da divisão!</title>
</head>
<body>
    <h1>Calcule o resto da divisão</h1>
    <input type="number" id="num1" placeholder=" número 1" />
    <input type="number" id="num2" placeholder=" número 2" />
    <button id="calcular">Calcular Resto</button>

     <!-- Parágrafo para mostrar o resultado -->    
  <p id="resultado"></p>    

  <script>          
    const input1 = document.getElementById('num1'); // Seleciona o primeiro input
    const input2 = document.getElementById('num2');
    const btnCalcular = document.getElementById('calcular'); // Seleciona o botão
    const resultado = document.getElementById('resultado');

    btnCalcular.addEventListener('click', () => { // Adiciona um evento de clique ao botão
      const n1 = Number(input1.value);
      const n2 = Number(input2.value);
      const resto = n1 % n2; // Resto da divisão

      // Mostrar no console
      console.log(`O resto da divisão de ${n1} por ${n2} é: ${resto}`);

      // Mostrar no parágrafo
      resultado.textContent = `O resto da divisão de ${n1} por ${n2} é: ${resto}`;
    });
  </script>
</body>
</html>
